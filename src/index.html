<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>klikker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="flash-overlay"></div>
<div id="app-container">
    <div id="grid-container" class="grid"></div>
    <div class="controls">
        <button id="btn-settings" class="ctrl-btn">Settings</button>
        <button id="btn-share" class="ctrl-btn">Share</button>
    </div>
</div>
<div id="modal-settings" class="modal hidden">
    <div class="modal-content"><h2>Settings</h2>
        <div id="settings-list"></div>
    </div>
</div>
<div id="color-picker-modal" class="modal hidden">
    <div class="modal-content color-picker-content"><h3>Select Color</h3>
        <div id="color-grid" class="color-grid"></div>
        <button id="btn-close-color" class="action-btn close">Cancel</button>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
